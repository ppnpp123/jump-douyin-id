<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 320px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 18px;
            color: #00d4ff;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 12px;
            color: #888;
        }
        .status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #16213e;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .status-label {
            font-size: 14px;
        }
        .toggle {
            position: relative;
            width: 50px;
            height: 26px;
        }
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #00d4ff;
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        .stats {
            padding: 15px;
            background: #16213e;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .stats-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }
        .stats-value {
            font-size: 24px;
            color: #00d4ff;
            font-weight: bold;
        }
        .keywords-section {
            padding: 15px;
            background: #16213e;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .keywords-title {
            font-size: 14px;
            color: #fff;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .keywords-title span {
            font-size: 11px;
            color: #888;
        }
        .keywords-input {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            resize: vertical;
            min-height: 60px;
        }
        .keywords-input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .keywords-hint {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: #00d4ff;
            color: #1a1a2e;
        }
        .btn-primary:hover {
            background: #00b8e6;
        }
        .btn-secondary {
            background: #16213e;
            color: #fff;
            border: 1px solid #333;
        }
        .btn-secondary:hover {
            background: #1f2f4f;
        }
        .btn-save {
            background: #10b981;
            color: #fff;
        }
        .btn-save:hover {
            background: #059669;
        }
        .info {
            text-align: center;
            font-size: 11px;
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔥 去广告插件</h1>
        <p>火山引擎广告自动跳过</p>
    </div>
    
    <div class="status">
        <span class="status-label">插件状态</span>
        <label class="toggle">
            <input type="checkbox" id="enableToggle" checked>
            <span class="slider"></span>
        </label>
    </div>
    
    <div class="stats">
        <div class="stats-title">已跳过广告数量</div>
        <div class="stats-value" id="skipCount">0</div>
    </div>
    
    <div class="keywords-section">
        <div class="keywords-title">
            自定义关键词
            <span>多个用逗号分隔</span>
        </div>
        <textarea class="keywords-input" id="keywordsInput" placeholder="例如: 火山引擎, 购物, 广告"></textarea>
        <div class="keywords-hint">检测到包含这些关键词的内容时自动跳过</div>
    </div>
    
    <button class="btn btn-save" id="saveKeywords">保存关键词</button>
    <button class="btn btn-primary" id="skipNow">立即跳过当前广告</button>
    <button class="btn btn-secondary" id="refreshStats">刷新统计</button>
    
    <div class="info">在抖音/火山引擎视频平台自动生效</div>
    
    <script src="popup.js"></script>
</body>
</html>
